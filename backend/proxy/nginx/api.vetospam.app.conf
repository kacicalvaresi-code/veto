# ─── Nginx Configuration — api.vetospam.app ───────────────────────────────────
#
# Reverse proxy for the Veto backend (Node.js on port 3000).
# Certbot will automatically add the SSL block when you run:
#   sudo certbot --nginx -d api.vetospam.app
#
# Install path: /etc/nginx/sites-available/api.vetospam.app
# Enable with:  sudo ln -s /etc/nginx/sites-available/api.vetospam.app \
#                          /etc/nginx/sites-enabled/api.vetospam.app
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect (Certbot will manage this block) ───────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name api.vetospam.app;

    # Certbot will insert an ACME challenge location here automatically.
    # After cert issuance, Certbot replaces this block with a 301 redirect.
    return 301 https://$host$request_uri;
}

# ── HTTPS — main server block ─────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name api.vetospam.app;

    # ── SSL (managed by Certbot — do not edit manually) ──────────────────────
    # ssl_certificate     /etc/letsencrypt/live/api.vetospam.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.vetospam.app/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "no-referrer"                         always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/veto-api-access.log;
    error_log  /var/log/nginx/veto-api-error.log;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_types      application/json application/octet-stream text/plain;
    gzip_min_length 1024;

    # ── Proxy to Node.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (future-proofing)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        # Pass real client IP to the Node.js app for rate limiting
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts — generous for the binary spam-list download endpoint
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings for the binary file download
        proxy_buffering           on;
        proxy_buffer_size         16k;
        proxy_buffers             8 16k;
        proxy_busy_buffers_size   32k;
    }

    # ── Static binary spam list — aggressive caching ─────────────────────────
    # The app uses ETag/304 to avoid re-downloading unchanged files, but
    # Nginx will also serve a Cache-Control header to CDN-aware clients.
    location /api/spam-list/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow clients to cache the binary for up to 7 days;
        # the ETag mechanism in the Node server handles freshness.
        add_header Cache-Control "public, max-age=604800, must-revalidate";
    }

    # ── Health check — no auth, no rate limit ────────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        access_log         off;
    }
}
